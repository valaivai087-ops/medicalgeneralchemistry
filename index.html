<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Medical General Chemistry OS</title>
  <style>
    :root {
      --ink: #16201d;
      --muted: #5f6f69;
      --line: #d8dfda;
      --panel: #ffffff;
      --bg: #f4f7f1;
      --green: #0f6b4f;
      --teal: #0b7285;
      --gold: #a66f00;
      --red: #9b2c2c;
      --shadow: 0 12px 30px rgba(28, 43, 36, .10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Noto Sans TC", system-ui, sans-serif;
    }

    button, input, select {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px 1fr;
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
      border-right: 1px solid var(--line);
      background: #fbfcf8;
      padding: 18px;
    }

    main {
      min-width: 0;
      padding: 22px;
    }

    .brand {
      display: grid;
      gap: 4px;
      margin-bottom: 16px;
    }

    .brand h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1.15;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .controls {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .search,
    .voice {
      width: 100%;
      border: 1px solid var(--line);
      background: white;
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--ink);
    }

    .level-list {
      display: grid;
      gap: 8px;
    }

    .level-btn {
      width: 100%;
      border: 1px solid var(--line);
      background: white;
      border-radius: 8px;
      padding: 10px;
      text-align: left;
      cursor: pointer;
      display: grid;
      gap: 4px;
    }

    .level-btn:hover,
    .level-btn.active {
      border-color: var(--green);
      box-shadow: 0 0 0 2px rgba(15, 107, 79, .12);
    }

    .level-btn strong {
      font-size: 14px;
      color: var(--green);
    }

    .level-btn span {
      font-size: 13px;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .mode-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip,
    .icon-btn {
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
      border-radius: 8px;
      min-height: 38px;
      padding: 8px 11px;
      cursor: pointer;
    }

    .chip.active {
      background: var(--green);
      border-color: var(--green);
      color: white;
    }

    .icon-btn {
      min-width: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .icon-btn.primary {
      background: var(--teal);
      color: white;
      border-color: var(--teal);
    }

    .hero {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 16px;
    }

    .eyebrow {
      color: var(--gold);
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .hero h2 {
      margin: 0;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.05;
    }

    .hero .zh {
      color: var(--green);
      font-weight: 700;
      font-size: 20px;
    }

    .chapter {
      color: var(--muted);
      font-size: 15px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(300px, .85fr);
      gap: 16px;
      align-items: start;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 16px;
    }

    .section h3 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .bilingual-line {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 10px;
      padding: 11px 0;
      border-top: 1px solid #edf1ed;
    }

    .bilingual-line:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .speak {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #f9fbf8;
      cursor: pointer;
    }

    .english {
      margin: 0 0 5px;
      font-weight: 700;
      line-height: 1.45;
    }

    .chinese {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .mini {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px;
      background: #fbfcfa;
      min-height: 72px;
    }

    .mini b {
      color: var(--green);
      display: block;
      margin-bottom: 5px;
    }

    .mini span {
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      background: #eef5f0;
      color: #174d3d;
      border: 1px solid #d7e6dc;
      border-radius: 999px;
      padding: 6px 9px;
      font-size: 13px;
    }

    .wisdom {
      border-left: 4px solid var(--gold);
      padding: 12px 14px;
      background: #fffaf0;
      border-radius: 0 8px 8px 0;
      line-height: 1.6;
      font-weight: 700;
    }

    .map {
      display: grid;
      gap: 7px;
      font-size: 14px;
    }

    .map-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }

    .map-item.active {
      color: var(--green);
      font-weight: 700;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--line);
      flex: 0 0 auto;
    }

    .map-item.active .dot {
      background: var(--green);
    }




    .mindmap-board {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .mind-center {
      border: 2px solid var(--green);
      background: #eef8f1;
      border-radius: 8px;
      padding: 14px;
      text-align: center;
      font-weight: 800;
      color: var(--green);
    }

    .mind-branches {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .mind-branch {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfa;
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .mind-branch h4 {
      margin: 0;
      color: var(--teal);
      font-size: 15px;
    }

    .mind-branch ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .micro-label {
      display: inline-block;
      color: var(--gold);
      font-weight: 800;
      margin-right: 4px;
    }
    .study-strip {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .memory-list {
      margin: 0;
      padding-left: 19px;
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
    }

    .question-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfa;
      display: grid;
      gap: 8px;
    }

    .question-card .answer {
      border-left: 3px solid var(--teal);
      padding-left: 10px;
      color: var(--muted);
      line-height: 1.5;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }


    .lecture-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, .9fr);
      gap: 12px;
    }

    .lecture-block {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .lecture-block h4 {
      margin: 0;
      color: var(--green);
      font-size: 16px;
    }

    .lecture-block p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 15px;
    }

    .worked-example {
      border: 1px solid #c9d9e1;
      background: #f6fbfd;
      border-radius: 8px;
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .visual-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .poster-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, #ffffff, #f8fbf7);
      padding: 14px;
      display: grid;
      gap: 10px;
      min-height: 170px;
    }

    .poster-title {
      color: var(--green);
      font-weight: 800;
      font-size: 16px;
      line-height: 1.3;
    }

    .formula-box {
      border: 2px solid var(--teal);
      background: #eefaff;
      border-radius: 8px;
      padding: 12px;
      font-weight: 900;
      font-size: 18px;
      line-height: 1.45;
      text-align: center;
      color: #084c5a;
    }

    .arrow-flow {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .flow-node {
      border: 1px solid #cbd8d0;
      background: #ffffff;
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.35;
    }

    .arrow {
      color: var(--gold);
      font-weight: 900;
    }

    .compare-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .compare-table td,
    .compare-table th {
      border: 1px solid var(--line);
      padding: 8px;
      vertical-align: top;
      line-height: 1.4;
    }

    .compare-table th {
      background: #eef5f0;
      color: var(--green);
    }

    .quiz-mini {
      border-left: 4px solid var(--teal);
      background: #f8fcfd;
      padding: 9px 10px;
      border-radius: 0 8px 8px 0;
      line-height: 1.5;
      font-size: 14px;
    }

    .clinical-path {
      display: grid;
      gap: 7px;
    }

    .clinical-path div {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fffdf7;
      line-height: 1.45;
      font-size: 14px;
    }
    .wide {
      margin-top: 16px;
    }

    .os-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .output-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .module-card {
      border: 1px solid var(--line);
      background: #fbfcfa;
      border-radius: 8px;
      padding: 12px;
      display: grid;
      gap: 7px;
      align-content: start;
    }

    .module-card h4 {
      margin: 0;
      color: var(--green);
      font-size: 15px;
      line-height: 1.35;
    }

    .module-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .data-table th,
    .data-table td {
      border: 1px solid var(--line);
      padding: 9px;
      text-align: left;
      vertical-align: top;
      line-height: 1.45;
    }

    .data-table th {
      background: #eef5f0;
      color: #174d3d;
    }

    .diagram {
      border: 1px dashed #b9c8bf;
      background: #fcfdf9;
      border-radius: 8px;
      padding: 12px;
      line-height: 1.8;
      color: var(--ink);
      overflow-x: auto;
    }

    .stack {
      display: grid;
      gap: 10px;
    }
    .hidden {
      display: none;
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        position: relative;
        height: auto;
      }

      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      main,
      aside {
        padding: 14px;
      }

      .lecture-grid,
      .visual-grid,
      .mind-branches,
      .study-strip,
      .os-grid,
      .output-grid {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .toolbar {
        align-items: stretch;
      }

      .mode-group,
      .icon-btn.primary {
        width: 100%;
      }

      .chip {
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <h1>Medical General Chemistry OS</h1>
        <p>普通化學醫學作業系統。雙語呈現，英文可朗讀，所有內容預先建立，離線可用。</p>
      </div>
      <div class="controls">
        <input id="search" class="search" type="search" placeholder="搜尋 OS、章節、醫學連結">
        <select id="voiceSelect" class="voice" title="English voice"></select>
      </div>
      <div id="levelList" class="level-list"></div>
    </aside>

    <main>
      <div class="toolbar">
        <div class="mode-group" aria-label="Display mode">
          <button class="chip active" data-mode="both">中英</button>
          <button class="chip" data-mode="en">English</button>
          <button class="chip" data-mode="zh">中文</button>
        </div>
        <button id="speakAll" class="icon-btn primary" title="Read English content aloud">▶ 朗讀本章英文</button>
      </div>

      <section class="hero">
        <div id="levelNumber" class="eyebrow"></div>
        <h2 id="titleEn"></h2>
        <div id="titleZh" class="zh"></div>
        <div id="chapter" class="chapter"></div>
      </section>

      <div class="layout">
        <div>
          <section class="section">
            <h3>雙語核心定位</h3>
            <div id="bilingual"></div>
          </section>

          <section class="section">
            <h3>必建模組</h3>
            <div id="modules" class="grid"></div>
          </section>

          <section class="section">
            <h3>醫學連結</h3>
            <div id="medicalLinks" class="grid"></div>
          </section>
        </div>

        <div>
          <section class="section">
            <h3>核心智慧</h3>
            <div id="wisdom" class="wisdom"></div>
          </section>

          <section class="section">
            <h3>世界地圖</h3>
            <div id="worldMap" class="map"></div>
          </section>

          <section class="section">
            <h3>APP 模組</h3>
            <div id="appModules" class="grid"></div>
          </section>
        </div>
      </div>

      <section class="section wide">
        <h3>講義核心頁</h3>
        <div id="plainTalk" class="study-strip"></div>
      </section>

      <section class="section wide">
        <h3>題庫解析頁</h3>
        <div id="examQuestions" class="output-grid"></div>
      </section>


      <section class="section wide">
        <h3>完整講義頁：從零讀通</h3>
        <div id="lecturePack" class="lecture-grid"></div>
      </section>

      <section class="section wide">
        <h3>補足理解：先備、例題、FAQ、易混淆</h3>
        <div id="understandingPack" class="visual-grid"></div>
      </section>
      <section class="section wide">
        <h3>最小記憶圖解頁</h3>
        <div id="memorizePack" class="output-grid"></div>
      </section>

      <section class="section wide">
        <h3>解題與臨床圖解頁</h3>
        <div id="usePack" class="output-grid"></div>
      </section>

      <section class="section wide">
        <h3>心智圖：最整合的呈現</h3>
        <div id="integratedMindMap" class="mindmap-board"></div>
      </section>
      <section class="section wide">
        <h3>OS 四層解析：本體／結構／機制／行動</h3>
        <div id="osLayers" class="os-grid"></div>
      </section>

      <section class="section wide">
        <h3>一頁總表：雙語＋IPA＋字根</h3>
        <div id="onePageTable"></div>
      </section>

      <section class="section wide">
        <h3>固定圖表產出</h3>
        <div id="diagramPack" class="output-grid"></div>
      </section>

      <section class="section wide">
        <h3>分級版本</h3>
        <div id="levelVersions" class="output-grid"></div>
      </section>

      <section class="section wide">
        <h3>核心模型與核心公式</h3>
        <div id="modelsFormulas" class="output-grid"></div>
      </section>

      <section class="section wide">
        <h3>Anki、Quiz、錯題本</h3>
        <div id="practicePack" class="output-grid"></div>
      </section>

      <section class="section wide">
        <h3>臨床疾病連結</h3>
        <div id="diseaseLinks" class="grid"></div>
      </section>
    </main>
  </div>

  <script>
    const levels = [
      {
        level: 1,
        osEn: "Matter OS",
        osZh: "物質作業系統",
        chapterEn: "Chapter 1: Matter and Measurement",
        chapterZh: "第 1 章：物質與測量",
        coreEn: "Matter and measurement are the shared language of medical science.",
        coreZh: "物質與測量是所有醫學科學的共同語言。",
        focusEn: "Without units, concentration, mass, volume, density, significant figures, and uncertainty, students cannot understand dosage, laboratory values, osmotic pressure, pH, or physiological data.",
        focusZh: "沒有單位、濃度、質量、體積、密度、有效數字與誤差概念，就無法理解藥物劑量、檢驗數值、滲透壓、酸鹼值與生理資料。",
        modules: ["Matter classification", "Physical and chemical properties", "SI units", "Unit conversion", "Significant figures", "Density", "Temperature scales", "Measurement uncertainty"],
        links: ["Drug dosage", "IV fluid volume", "Blood laboratory values", "Urine specific gravity", "Fever measurement", "Laboratory error"],
        wisdom: "Medicine begins when matter becomes measurable."
      },
      {
        level: 2,
        osEn: "Atom OS",
        osZh: "原子作業系統",
        chapterEn: "Chapter 2: Atoms, Molecules, Ions",
        chapterZh: "第 2 章：原子、分子、離子",
        coreEn: "Atoms are the smallest medical grammar of matter, and ions run physiology.",
        coreZh: "原子是物質的最小醫學語法，離子則驅動生理功能。",
        focusEn: "Ions explain membrane potential, electrolyte balance, acid-base control, enzyme function, and many drug actions.",
        focusZh: "離子可以解釋膜電位、電解質平衡、酸鹼控制、酵素功能與許多藥物作用。",
        modules: ["Atomic theory", "Protons", "Neutrons", "Electrons", "Atomic number", "Isotopes", "Ions", "Molecular formula"],
        links: ["Sodium and potassium", "Calcium signaling", "Hydrogen ion and pH", "Iron in hemoglobin", "Iodine isotopes", "Magnesium and enzymes"],
        wisdom: "Atoms build matter; ions run physiology."
      },
      {
        level: 3,
        osEn: "Reaction OS",
        osZh: "化學反應作業系統",
        chapterEn: "Chapter 3: Chemical Reactions and Stoichiometry",
        chapterZh: "第 3 章：化學反應與化學計量",
        coreEn: "Chemical reactions explain how matter changes, and stoichiometry controls the amount of change.",
        coreZh: "化學反應解釋物質如何改變，化學計量控制改變的數量。",
        focusEn: "Metabolism, oxygen consumption, carbon dioxide production, antidote dosing, and acid-base neutralization all depend on reaction logic.",
        focusZh: "代謝、耗氧量、二氧化碳生成、解毒劑劑量與酸鹼中和都依賴反應邏輯。",
        modules: ["Chemical equations", "Balancing equations", "Mole concept", "Molar mass", "Avogadro number", "Limiting reactant", "Percent yield", "Reaction types"],
        links: ["Glucose oxidation", "Oxygen consumption", "Carbon dioxide production", "Drug metabolism", "Antidote dosing", "Acid-base neutralization"],
        wisdom: "Reactions explain change; stoichiometry controls dose."
      },
      {
        level: 4,
        osEn: "Solution OS",
        osZh: "溶液作業系統",
        chapterEn: "Chapter 4 + Chapter 13: Aqueous Reactions and Properties of Solutions",
        chapterZh: "第 4 章 + 第 13 章：水溶液反應與溶液性質",
        coreEn: "The human body is a regulated aqueous solution system.",
        coreZh: "人體是一個被嚴密調控的水溶液系統。",
        focusEn: "Plasma, intracellular fluid, urine, gastric juice, and cerebrospinal fluid are all solution systems governed by concentration, electrolytes, and osmotic pressure.",
        focusZh: "血漿、細胞內液、尿液、胃液與腦脊髓液都是由濃度、電解質與滲透壓控制的溶液系統。",

    function speak(text) {
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "en-US";
      utterance.rate = 0.86;
      utterance.pitch = 1;
      const chosen = voices.find(v => v.name === voiceSelect.value);
      if (chosen) utterance.voice = chosen;
      window.speechSynthesis.speak(utterance);
    }

    function loadVoices() {
      voices = window.speechSynthesis.getVoices().filter(v => v.lang.toLowerCase().startsWith("en"));
      voiceSelect.innerHTML = voices.map(v => `<option value="${v.name}">${v.name} (${v.lang})</option>`).join("");
    }

    function line(en, zh) {
      const enHidden = mode === "zh" ? "hidden" : "";
      const zhHidden = mode === "en" ? "hidden" : "";
      return `
        <div class="bilingual-line">
          <button class="speak" title="Speak English" data-speak="${escapeAttr(en)}">▶</button>
          <div>
            <p class="english ${enHidden}">${en}</p>
            <p class="chinese ${zhHidden}">${zh}</p>
          </div>
        </div>
      `;
    }

    function escapeAttr(value) {
      return value.replaceAll("&", "&amp;").replaceAll('"', "&quot;").replaceAll("<", "&lt;");
    }

    function renderList() {
      const q = search.value.trim().toLowerCase();
      levelList.innerHTML = "";
      levels.forEach((item, index) => {
        const haystack = [item.osEn, item.osZh, item.chapterEn, item.chapterZh, item.coreEn, item.coreZh, ...item.links].join(" ").toLowerCase();
        if (q && !haystack.includes(q)) return;
        const btn = document.createElement("button");
        btn.className = "level-btn" + (index === selected ? " active" : "");
        btn.innerHTML = `<strong>Level ${item.level} · ${item.osEn}</strong><span>${item.osZh}</span><span>${item.chapterEn}</span>`;
        btn.addEventListener("click", () => {
          selected = index;
          render();
        });
        levelList.appendChild(btn);
      });
    }

    function render() {
      const item = levels[selected];
      document.querySelector("#levelNumber").textContent = `Level ${item.level}`;
      document.querySelector("#titleEn").textContent = item.osEn;
      document.querySelector("#titleZh").textContent = item.osZh;
      document.querySelector("#chapter").textContent = `${item.chapterEn}｜${item.chapterZh}`;
      document.querySelector("#bilingual").innerHTML = [
        line(item.coreEn, item.coreZh),
        line(item.focusEn, item.focusZh),
        line(item.wisdom, "核心智慧：" + translateWisdom(item.level))

      document.querySelector("#modules").innerHTML = item.modules.map((m, i) => {

    function moduleFacts(term, item) {
      const specific = {
        "Entropy": ["Entropy is the dispersal of energy and matter into more possible arrangements. In thermodynamics it predicts the direction of spontaneous change together with enthalpy and temperature. Formula link: ΔG = ΔH - TΔS. Unit: J/K or J mol⁻¹ K⁻¹. Clinical meaning: ATP hydrolysis and metabolic coupling increase total entropy while cells preserve local order.", "Entropy（熵）是能量與物質分散到更多可能排列的程度。熱力學中，熵會和焓、溫度一起決定自發變化方向。公式連結：ΔG = ΔH - TΔS。單位：J/K 或 J mol⁻¹ K⁻¹。臨床意義：ATP 水解與代謝偶聯讓總熵增加，同時讓細胞維持局部秩序。"],
        "Spontaneity": ["Spontaneity means thermodynamic favorability, not speed. A spontaneous process has negative ΔG under the stated conditions. Clinical meaning: favorable and unfavorable reactions are coupled in metabolism.", "Spontaneity（自發性）代表熱力學上有利，不代表反應速度快。在特定條件下 ΔG < 0 的過程具有自發性。臨床意義：代謝中有利反應會和不利反應偶聯。"],
        "Gibbs free energy": ["Gibbs free energy is usable chemical energy at constant temperature and pressure. Formula: ΔG = ΔH - TΔS. Unit: kJ/mol. Clinical meaning: ATP, ion gradients, and biosynthesis depend on free-energy coupling.", "Gibbs free energy（吉布斯自由能）是在定溫定壓下可用的化學能。公式：ΔG = ΔH - TΔS。單位：kJ/mol。臨床意義：ATP、離子梯度與生合成都依賴自由能偶聯。"],
        "Enthalpy": ["Enthalpy is heat content at constant pressure. Exothermic processes release heat; endothermic processes absorb heat. Unit: kJ/mol. Clinical meaning: metabolism, fever, and heat balance are enthalpy-linked phenomena.", "Enthalpy（焓）是在定壓下的熱含量。放熱過程釋放熱，吸熱過程吸收熱。單位：kJ/mol。臨床意義：代謝、發燒與熱平衡都和焓變有關。"],
        "Temperature": ["Temperature scales the entropy term in ΔG = ΔH - TΔS. Higher temperature increases the influence of entropy on spontaneity. Clinical meaning: fever changes reaction rates, protein stability, and metabolic demand.", "Temperature（溫度）會放大 ΔG = ΔH - TΔS 中的熵項。溫度越高，熵對自發性的影響越大。臨床意義：發燒會改變反應速率、蛋白質穩定性與代謝需求。"],
        "Free energy and equilibrium": ["Free energy and equilibrium are linked by ΔG = ΔG° + RT ln Q. At equilibrium, ΔG = 0. Clinical meaning: oxygen binding, buffer systems, and metabolic direction depend on equilibrium position.", "自由能與平衡由 ΔG = ΔG° + RT ln Q 連接。達平衡時 ΔG = 0。臨床意義：氧氣結合、緩衝系統與代謝方向都取決於平衡位置。"],
        "Coupled reactions": ["Coupled reactions use a favorable process to drive an unfavorable process. ATP hydrolysis commonly supplies the negative ΔG. Clinical meaning: biosynthesis, active transport, and phosphorylation depend on coupling.", "偶聯反應用有利反應推動不利反應。ATP 水解常提供負的 ΔG。臨床意義：生合成、主動運輸與磷酸化都依賴偶聯。"],
        "Biological energy coupling": ["Biological energy coupling converts food energy, redox energy, and ion gradients into ATP-dependent work. Clinical meaning: mitochondrial dysfunction reduces ATP supply and disrupts high-energy tissues.", "生物能量偶聯把食物能、氧化還原能與離子梯度轉成 ATP 相關的功。臨床意義：粒線體功能障礙會降低 ATP 供應，特別影響高耗能組織。"],
        "Atomic theory": ["Rule: atoms are conserved and rearranged during reactions. Formula link: balanced equations preserve atom count. Unit link: atoms connect to moles through Avogadro number. Clinical meaning: drug molecules and metabolites follow atom conservation.", "規則：原子在反應中守恆並重新排列。公式連結：平衡方程式保留原子數。單位連結：原子透過亞佛加厥常數連到莫耳。臨床意義：藥物分子與代謝物都遵守原子守恆。"],

        11: "弱作用力足以組織生命。",
        12: "固體結構控制身體與醫學材料的功能。",
        13: "生命是透過消耗能量來維持秩序的熱力學策略。"
      };
      return map[level];
    }

    function attachSpeakButtons() {
      document.querySelectorAll("[data-speak]").forEach(btn => {
        btn.addEventListener("click", () => speak(btn.dataset.speak));
      });
    }

    document.querySelectorAll("[data-mode]").forEach(btn => {
      btn.addEventListener("click", () => {
        mode = btn.dataset.mode;
        document.querySelectorAll("[data-mode]").forEach(b => b.classList.toggle("active", b === btn));
        render();
      });
    });

    document.querySelector("#speakAll").addEventListener("click", () => {
      const item = levels[selected];
      speak([item.osEn, item.chapterEn, item.coreEn, item.focusEn, item.wisdom].join(". "));
    });

    search.addEventListener("input", renderList);
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();
    render();
  </script>
</body>
</html>
